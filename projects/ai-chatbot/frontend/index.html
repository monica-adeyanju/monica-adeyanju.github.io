<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #faf6f1;
            color: #2c1810;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #2c1810;
            color: #faf6f1;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .header .status {
            font-size: 0.75rem;
            color: #c4aa8e;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 75%;
            padding: 0.85rem 1.1rem;
            border-radius: 12px;
            font-size: 0.92rem;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #8b4513;
            color: #faf6f1;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #fff;
            border: 1px solid #e0d5c8;
            color: #2c1810;
            border-bottom-left-radius: 4px;
        }

        .message.error {
            align-self: center;
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #991b1b;
            font-size: 0.82rem;
        }

        .message.system {
            align-self: center;
            color: #8b7355;
            font-size: 0.82rem;
            font-style: italic;
        }

        .typing-indicator {
            align-self: flex-start;
            padding: 0.85rem 1.1rem;
            background: #fff;
            border: 1px solid #e0d5c8;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            display: none;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #c4aa8e;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .input-area {
            padding: 1rem 1.5rem;
            background: #fff;
            border-top: 1px solid #e0d5c8;
            display: flex;
            gap: 0.75rem;
        }

        .input-area input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #e0d5c8;
            border-radius: 8px;
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: #8b4513;
        }

        .input-area button {
            padding: 0.75rem 1.5rem;
            background: #8b4513;
            color: #faf6f1;
            border: none;
            border-radius: 8px;
            font-size: 0.92rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .input-area button:hover {
            background: #a0522d;
        }

        .input-area button:disabled {
            background: #c4aa8e;
            cursor: not-allowed;
        }

        .welcome {
            text-align: center;
            padding: 3rem 1rem;
            color: #5c4033;
        }

        .welcome h2 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: #2c1810;
        }

        .welcome p {
            font-size: 0.9rem;
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .config-banner {
            background: #fef3cd;
            border: 1px solid #ffc107;
            padding: 0.75rem 1rem;
            font-size: 0.8rem;
            text-align: center;
            color: #856404;
        }

        .config-banner code {
            background: rgba(0,0,0,0.06);
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AI Chatbot</h1>
        <span class="status" id="status">Ready</span>
    </div>

    <div class="config-banner" id="configBanner">
        Set your API endpoint: open <code>chat.js</code> and update <code>API_ENDPOINT</code> with your CloudFormation stack output.
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="welcome">
            <h2>Welcome to AI Chatbot</h2>
            <p>Powered by Amazon Bedrock (Claude). Ask me anything — I'll remember our conversation.</p>
        </div>
    </div>

    <div class="typing-indicator" id="typingIndicator">
        <span></span><span></span><span></span>
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off">
        <button id="sendButton" onclick="sendMessage()">Send</button>
    </div>

    <script src="chat.js"></script>
</body>
</html>
