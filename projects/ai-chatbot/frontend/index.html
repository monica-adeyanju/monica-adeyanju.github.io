<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Chatbot — Production Grade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#faf6f1;color:#2c1810;height:100vh;display:flex;flex-direction:column}
.header{background:#2c1810;color:#faf6f1;padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:1rem;font-weight:600}
.header-right{display:flex;align-items:center;gap:1rem}
.header .user-info{font-size:.75rem;color:#c4aa8e}
.header .btn-sm{font-size:.7rem;padding:.3rem .6rem;background:#8b4513;color:#faf6f1;border:none;border-radius:4px;cursor:pointer}
.header .btn-sm:hover{background:#a0522d}

/* Auth Screen */
.auth-screen{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
.auth-box{background:#fff;border:1px solid #e0d5c8;border-radius:12px;padding:2.5rem;width:100%;max-width:380px}
.auth-box h2{font-size:1.2rem;margin-bottom:.5rem;color:#2c1810}
.auth-box p{font-size:.85rem;color:#5c4033;margin-bottom:1.5rem}
.auth-box input{width:100%;padding:.7rem 1rem;border:1px solid #e0d5c8;border-radius:6px;font-size:.9rem;margin-bottom:.75rem;outline:none}
.auth-box input:focus{border-color:#8b4513}
.auth-box .btn{width:100%;padding:.75rem;background:#8b4513;color:#faf6f1;border:none;border-radius:6px;font-size:.9rem;font-weight:500;cursor:pointer;margin-top:.5rem}
.auth-box .btn:hover{background:#a0522d}
.auth-box .switch{text-align:center;margin-top:1rem;font-size:.8rem;color:#5c4033}
.auth-box .switch a{color:#8b4513;cursor:pointer;text-decoration:underline}
.auth-error{color:#991b1b;font-size:.8rem;margin-bottom:.75rem;display:none}

/* Chat Layout */
.app{flex:1;display:none;flex-direction:column}
.toolbar{padding:.5rem 1.5rem;background:#f0ebe4;border-bottom:1px solid #e0d5c8;display:flex;align-items:center;gap:1rem;font-size:.8rem}
.toolbar label{color:#5c4033}
.toolbar input[type=checkbox]{accent-color:#8b4513}
.usage-bar{margin-left:auto;display:flex;align-items:center;gap:.5rem}
.usage-bar .bar{width:80px;height:6px;background:#e0d5c8;border-radius:3px;overflow:hidden}
.usage-bar .bar-fill{height:100%;background:#8b4513;border-radius:3px;transition:width .3s}
.usage-bar span{font-size:.7rem;color:#8b7355}

.chat-container{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:.75rem}
.message{max-width:75%;padding:.75rem 1rem;border-radius:12px;font-size:.88rem;line-height:1.6;word-wrap:break-word}
.message.user{align-self:flex-end;background:#8b4513;color:#faf6f1;border-bottom-right-radius:4px}
.message.assistant{align-self:flex-start;background:#fff;border:1px solid #e0d5c8;border-bottom-left-radius:4px}
.message.error{align-self:center;background:#fef2f2;border:1px solid #fca5a5;color:#991b1b;font-size:.8rem}
.message .meta{font-size:.65rem;color:#8b7355;margin-top:.4rem;display:flex;gap:.75rem}
.message.user .meta{color:#c4aa8e}

.typing{align-self:flex-start;padding:.75rem 1rem;background:#fff;border:1px solid #e0d5c8;border-radius:12px;display:none}
.typing span{display:inline-block;width:7px;height:7px;background:#c4aa8e;border-radius:50%;margin:0 2px;animation:b 1.4s infinite ease-in-out}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes b{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

.input-area{padding:.75rem 1.5rem;background:#fff;border-top:1px solid #e0d5c8;display:flex;gap:.5rem}
.input-area input{flex:1;padding:.7rem 1rem;border:1px solid #e0d5c8;border-radius:8px;font-size:.88rem;outline:none}
.input-area input:focus{border-color:#8b4513}
.input-area button{padding:.7rem 1.2rem;background:#8b4513;color:#faf6f1;border:none;border-radius:8px;font-size:.88rem;font-weight:500;cursor:pointer}
.input-area button:hover{background:#a0522d}
.input-area button:disabled{background:#c4aa8e;cursor:not-allowed}
.input-area .upload-btn{background:transparent;border:1px solid #e0d5c8;color:#5c4033;font-size:.8rem}
.input-area .upload-btn:hover{border-color:#8b4513;color:#8b4513}

/* Upload Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:2rem;width:90%;max-width:400px}
.modal h3{margin-bottom:1rem;font-size:1rem}
.modal input[type=file]{margin-bottom:1rem;font-size:.85rem}
.modal .btn{padding:.6rem 1.2rem;background:#8b4513;color:#faf6f1;border:none;border-radius:6px;cursor:pointer;font-size:.85rem}
.modal .btn-cancel{background:transparent;color:#5c4033;border:1px solid #e0d5c8;margin-left:.5rem}
.modal .upload-status{font-size:.8rem;color:#5c4033;margin-top:.75rem}
</style>
</head>
<body>
<!-- Auth Screen -->
<div class="auth-screen" id="authScreen">
<div class="auth-box">
<h2 id="authTitle">Sign In</h2>
<p id="authSubtitle">Sign in to start chatting with AI</p>
<div class="auth-error" id="authError"></div>
<input type="email" id="authEmail" placeholder="Email address">
<input type="password" id="authPassword" placeholder="Password">
<input type="password" id="authConfirm" placeholder="Confirm password" style="display:none">
<button class="btn" id="authBtn" onclick="handleAuth()">Sign In</button>
<div class="switch" id="authSwitch">
Don't have an account? <a onclick="toggleAuthMode()">Sign Up</a>
</div>
</div>
</div>

<!-- Main App -->
<div class="app" id="app">
<div class="header">
<h1>AI Chatbot</h1>
<div class="header-right">
<span class="user-info" id="userInfo"></span>
<button class="btn-sm" onclick="signOut()">Sign Out</button>
</div>
</div>
<div class="toolbar">
<label><input type="checkbox" id="ragToggle"> Use RAG (uploaded docs)</label>
<button class="btn-sm" onclick="showUploadModal()">Upload Doc</button>
<div class="usage-bar">
<div class="bar"><div class="bar-fill" id="usageBar" style="width:0%"></div></div>
<span id="usageText">0%</span>
</div>
</div>
<div class="chat-container" id="chat"></div>
<div class="typing" id="typing"><span></span><span></span><span></span></div>
<div class="input-area">
<input type="text" id="msgInput" placeholder="Type your message..." autocomplete="off">
<button id="sendBtn" onclick="sendMessage()">Send</button>
</div>
</div>

<!-- Upload Modal -->
<div class="modal-overlay" id="uploadModal">
<div class="modal">
<h3>Upload Document for RAG</h3>
<p style="font-size:.8rem;color:#5c4033;margin-bottom:1rem">Upload .txt, .md, .csv, or .json files. The AI will use them to ground answers.</p>
<input type="file" id="fileInput" accept=".txt,.md,.csv,.json,.pdf">
<div>
<button class="btn" onclick="uploadFile()">Upload</button>
<button class="btn btn-cancel" onclick="hideUploadModal()">Cancel</button>
</div>
<div class="upload-status" id="uploadStatus"></div>
</div>
</div>

<script src="auth.js"></script>
<script src="chat.js"></script>
</body>
</html>
